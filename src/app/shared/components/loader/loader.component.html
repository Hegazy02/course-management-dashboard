@if (loader.loading()) {
  <div class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/30 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4">
      <div
        class="h-12 w-12 animate-spin rounded-full border-4 border-gray-300" style="border-top-color: var(--p-primary-500)"
      ></div>

      <p class="text-sm font-medium text-white">Loading...</p>
    </div>
  </div>
}
