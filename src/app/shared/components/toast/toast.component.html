<div class="fixed top-4 right-4 z-50 flex flex-col gap-3">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="min-w-80 rounded-lg border bg-white p-4 shadow-lg"
      [class.border-green-500]="toast.type === 'success'"
      [class.border-red-500]="toast.type === 'error'"
      [class.border-yellow-500]="toast.type === 'warning'"
      [class.border-blue-500]="toast.type === 'info'"
    >
      <div class="flex items-start justify-between gap-3">
        <span>{{ toast.message }}</span>

        <button class="text-gray-500 hover:text-black" (click)="toastService.remove(toast.id)">
          ✕
        </button>
      </div>
    </div>
  }
</div>
