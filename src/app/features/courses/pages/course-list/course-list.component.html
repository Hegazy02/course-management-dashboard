<div class="my-4 flex flex-wrap gap-3 ms-2">
  <button
    type="button"
    pButton
    icon="pi pi-plus"
    label="Add Course"
    (click)="openAddDialog()"
  ></button>
  <button
    type="button"
    pButton
    severity="secondary"
    icon="pi pi-pencil"
    label="Edit Selected"
    [disabled]="!selectedCourse()"
    (click)="openEditDialog()"
  ></button>
  <button
    type="button"
    pButton
    severity="danger"
    icon="pi pi-trash"
    label="Delete Selected"
    [disabled]="!selectedCourse()"
    (click)="confirmDelete()"
  ></button>
</div>

<div class="flex flex-wrap items-center gap-4 mx-2 mb-4">
  <div class="relative">
    <input
      pInputText
      type="text"
      [ngModel]="searchTerm()"
      (ngModelChange)="searchTerm.set($event); onFilterChange()"
      placeholder="Search by course name..."
      class="pl-3 pr-3 py-2"
    />
  </div>

  <p-select
    [options]="statusOptions"
    [ngModel]="statusFilter()"
    (ngModelChange)="statusFilter.set($event); onFilterChange()"
    placeholder="Filter by status"
    class="w-48"
  />
</div>

<app-general-table
  [columns]="courseColumns"
  [data]="courses()"
  [loading]="loading()"
  [totalRecords]="totalRecords()"
  [rows]="pageSize()"
  [lazy]="true"
  [lazyLoadOnInit]="true"
  [paginator]="true"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
  [rowsPerPageOptions]="[10, 15, 20, 30]"
  [alwaysShowPaginator]="true"
  selectionMode="single"
  [selection]="selectedCourse()"
  (lazyLoad)="onLazyLoad($event)"
  (selectionChange)="selectCourse($event)"
  (cellClick)="onCellClick($event)"
/>

<app-course-dialog
  [(visible)]="dialogVisible"
  [course]="selectedCourse()"
  (saved)="refreshCourses()"
/>
